<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">memoryDemo retro cyber famicom hero</title>
  <desc id="desc">A refined cyber retro Famicom hero panel with CRT screen, cartridge, and profile title.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8ef"/>
      <stop offset="0.55" stop-color="#eee5d9"/>
      <stop offset="1" stop-color="#fffaf3"/>
    </linearGradient>
    <linearGradient id="ink" x1="96" y1="66" x2="1184" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171722"/>
      <stop offset="0.56" stop-color="#090b13"/>
      <stop offset="1" stop-color="#19101a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff5865"/>
      <stop offset="0.52" stop-color="#df1837"/>
      <stop offset="1" stop-color="#9d0827"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff7ec"/>
      <stop offset="0.55" stop-color="#d2cabf"/>
      <stop offset="1" stop-color="#fffdf8"/>
    </linearGradient>
    <linearGradient id="crt" x1="210" y1="154" x2="1070" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030711"/>
      <stop offset="0.58" stop-color="#111427"/>
      <stop offset="1" stop-color="#020309"/>
    </linearGradient>
    <pattern id="mosaic" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#fff8ef"/>
      <rect width="24" height="24" fill="#df1837" fill-opacity="0.10"/>
      <rect x="24" width="24" height="24" fill="#c8c0b5" fill-opacity="0.38"/>
      <rect x="72" width="24" height="24" fill="#11131d" fill-opacity="0.06"/>
      <rect x="48" y="24" width="24" height="24" fill="#df1837" fill-opacity="0.08"/>
      <rect y="48" width="24" height="24" fill="#11131d" fill-opacity="0.045"/>
      <rect x="48" y="48" width="24" height="24" fill="#c8c0b5" fill-opacity="0.25"/>
      <rect x="72" y="72" width="24" height="24" fill="#df1837" fill-opacity="0.13"/>
    </pattern>
    <pattern id="screenGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#62e6ef" stroke-opacity="0.06"/>
    </pattern>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="2" fill="#fff7ec" fill-opacity="0.06"/>
    </pattern>
    <clipPath id="screenClip"><rect x="210" y="154" width="860" height="304" rx="8"/></clipPath>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.34"/>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 .12 0 0 .05 0 0 .16 0 .12 0 0 0 .75 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0 0 .92 0 0 .9 0 0 1 0 1 0 0 0 .72 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:"SFMono-Regular","Cascadia Mono","Liberation Mono","Consolas",monospace}
      .cn{font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
      .label{font-size:18px;font-weight:800;letter-spacing:4px}
      .small{font-size:20px;font-weight:760;letter-spacing:2px}
      .title{font-size:78px;font-weight:900;letter-spacing:5px}
      @keyframes scanMove{from{transform:translateY(-28px)}to{transform:translateY(28px)}}
      @keyframes cart{0%,18%{transform:translateY(-62px)}34%,100%{transform:translateY(0)}}
      @keyframes flow{from{stroke-dashoffset:0}to{stroke-dashoffset:-120}}
      @keyframes blink{0%,48%{opacity:1}49%,100%{opacity:.18}}
      .scan{animation:scanMove 2.8s linear infinite}.cart{animation:cart 5.8s cubic-bezier(.2,.85,.25,1) infinite;transform-box:fill-box;transform-origin:center}.flow{stroke-dasharray:16 14;animation:flow 7.5s linear infinite}.blink{animation:blink 1.1s steps(1,end) infinite}
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#paper)"/>
  <rect width="1280" height="640" fill="url(#mosaic)" opacity=".86"/>
  <rect x="78" y="58" width="1124" height="536" rx="34" fill="url(#ink)" filter="url(#shadow)"/>
  <rect x="98" y="78" width="1084" height="496" rx="26" fill="none" stroke="#fff7ec" stroke-opacity=".18"/>
  <g filter="url(#shadow)">
    <rect x="108" y="86" width="1064" height="470" rx="42" fill="url(#shell)"/>
    <rect x="136" y="116" width="1008" height="414" rx="26" fill="#cbc6ba"/>
    <rect x="162" y="148" width="956" height="328" rx="14" fill="url(#red)"/>
    <rect x="196" y="140" width="888" height="332" rx="12" fill="#fff7ec"/>
    <rect x="210" y="154" width="860" height="304" rx="8" fill="url(#crt)"/>
    <rect x="210" y="154" width="860" height="304" rx="8" fill="url(#screenGrid)"/>
    <g class="scan"><rect x="210" y="126" width="860" height="360" fill="url(#scan)"/></g>
  </g>
  <g class="cart" filter="url(#shadow)">
    <rect x="528" y="38" width="224" height="110" rx="16" fill="#fff7ec" stroke="#df1837" stroke-width="7"/>
    <rect x="554" y="62" width="172" height="44" rx="5" fill="#12131d"/>
    <text x="640" y="92" text-anchor="middle" class="mono label" fill="#62e6ef">8-BIT CART</text>
    <rect x="584" y="124" width="112" height="20" fill="#1d1b27"/>
  </g>
  <g clip-path="url(#screenClip)">
    <rect x="210" y="154" width="860" height="304" fill="#050812" opacity=".4"/>
    <g opacity=".9">
      <rect x="246" y="322" width="58" height="92" fill="#171320"/>
      <rect x="322" y="282" width="68" height="132" fill="#21182b"/>
      <rect x="410" y="236" width="72" height="178" fill="#15121e"/>
      <rect x="504" y="282" width="68" height="132" fill="#21182b"/>
      <rect x="592" y="220" width="98" height="194" fill="#14111d"/>
      <rect x="714" y="268" width="70" height="146" fill="#21182b"/>
      <rect x="804" y="236" width="82" height="178" fill="#15121e"/>
      <rect x="906" y="294" width="62" height="120" fill="#21182b"/>
      <rect x="990" y="262" width="70" height="152" fill="#15121e"/>
    </g>
    <path d="M230 386L340 314L452 386L570 286L696 386L820 304L942 386L1048 292" stroke="#62e6ef" stroke-width="3" filter="url(#cyanGlow)" class="flow"/>
    <path d="M232 358L342 294L454 358L572 260L698 358L822 282L944 358L1048 270" stroke="#ff4b5b" stroke-width="3" filter="url(#redGlow)" class="flow"/>
  </g>
  <g class="mono">
    <text x="640" y="218" text-anchor="middle" class="label" fill="#62e6ef" filter="url(#cyanGlow)">CYBER FAMICOM MANUAL</text>
    <text x="640" y="310" text-anchor="middle" class="title" fill="#fff7ec" stroke="#df1837" stroke-width="2" paint-order="stroke" filter="url(#redGlow)">MEMORYDEMO</text>
    <text x="640" y="366" text-anchor="middle" class="label blink" fill="#ff5867">PRESS START</text>
    <text x="640" y="416" text-anchor="middle" class="small" fill="#fff7ec">AI TOOLING / AGENT WORKFLOWS / PRODUCT SYSTEMS</text>
  </g>
  <g>
    <rect x="226" y="506" width="112" height="32" rx="6" fill="#13131d"/>
    <rect x="250" y="480" width="30" height="80" rx="3" fill="#272331"/>
    <rect x="224" y="506" width="84" height="30" rx="3" fill="#272331"/>
    <rect x="458" y="516" width="182" height="18" rx="9" fill="#10111a"/>
    <rect x="668" y="516" width="182" height="18" rx="9" fill="#10111a"/>
    <circle cx="946" cy="526" r="32" fill="#df1837" filter="url(#redGlow)"/>
    <circle cx="1028" cy="526" r="32" fill="#11111b"/>
    <circle cx="1110" cy="526" r="32" fill="#18d4ea" filter="url(#cyanGlow)"/>
    <text x="282" y="596" text-anchor="middle" class="mono label" fill="#fff7ec">D-PAD</text>
    <text x="548" y="590" text-anchor="middle" class="mono label" fill="#fff7ec">SELECT</text>
    <text x="760" y="590" text-anchor="middle" class="mono label" fill="#fff7ec">RUN</text>
  </g>
</svg>
