<svg width="1280" height="180" viewBox="0 0 1280 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">memoryDemo insert coin footer</title>
  <desc id="desc">A compact retro footer marquee with insert coin text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="180" gradientUnits="userSpaceOnUse"><stop stop-color="#fff8ef"/><stop offset="1" stop-color="#eee5da"/></linearGradient>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Mono","Liberation Mono","Consolas",monospace}.label{font-size:18px;font-weight:800;letter-spacing:5px}@keyframes blink{0%,48%{opacity:1}49%,100%{opacity:.2}}.blink{animation:blink 1.2s steps(1,end) infinite}</style>
  </defs>
  <rect width="1280" height="180" fill="url(#bg)"/>
  <rect x="88" y="42" width="1104" height="96" rx="18" fill="#171722"/>
  <rect x="112" y="66" width="1056" height="48" rx="8" fill="#0b0d16" stroke="#fff7ec" stroke-opacity=".18"/>
  <text x="640" y="98" text-anchor="middle" class="mono label blink" fill="#62e6ef">INSERT COIN  |  PRESS START  |  BUILD THE NEXT SYSTEM</text>
</svg>
