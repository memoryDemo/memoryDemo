<svg width="1280" height="470" viewBox="0 0 1280 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">memoryDemo cartridge slots</title>
  <desc id="desc">A retro Famicom cartridge shelf with six polished capability cartridges.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="470" gradientUnits="userSpaceOnUse"><stop stop-color="#fff8ef"/><stop offset="1" stop-color="#eee5da"/></linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#151622"/><stop offset=".6" stop-color="#080b14"/><stop offset="1" stop-color="#120d17"/></linearGradient>
    <pattern id="mosaic" width="96" height="96" patternUnits="userSpaceOnUse"><rect width="96" height="96" fill="#fff8ef"/><rect width="24" height="24" fill="#df1837" fill-opacity=".07"/><rect x="48" y="48" width="24" height="24" fill="#c8c0b5" fill-opacity=".26"/><rect x="72" y="72" width="24" height="24" fill="#df1837" fill-opacity=".12"/></pattern>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="130%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity=".22"/></filter>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Mono","Liberation Mono","Consolas",monospace}.cn{font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif}.label{font-size:18px;font-weight:800;letter-spacing:4px}.name{font-size:23px;font-weight:900;letter-spacing:1.5px}@keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}.lift{animation:lift 5s ease-in-out infinite;transform-box:fill-box}</style>
  </defs>
  <rect width="1280" height="470" fill="url(#bg)"/><rect width="1280" height="470" fill="url(#mosaic)" opacity=".82"/>
  <rect x="88" y="46" width="1104" height="378" rx="26" fill="url(#ink)" filter="url(#shadow)"/>
  <text x="128" y="104" class="mono label" fill="#fff7ec">CARTRIDGE LIBRARY</text>
  <text x="1136" y="104" text-anchor="end" class="mono label" fill="#62e6ef">SIDE A</text>
  <path d="M128 124H1152" stroke="#fff7ec" stroke-opacity=".12"/>
  <path d="M150 262H1130" stroke="#df1837" stroke-opacity=".25" stroke-width="8" stroke-linecap="round"/>
  <path d="M150 262H1130" stroke="#fff7ec" stroke-opacity=".18" stroke-width="2" stroke-linecap="round" stroke-dasharray="16 18"/>
  <g class="mono lift">
    <rect x="128" y="142" width="300" height="106" rx="12" fill="#fff7ec"/><text x="150" y="162" font-size="13" font-weight="900" fill="#df1837">C-01</text><rect x="148" y="170" width="260" height="38" rx="5" fill="#df1837"/><text x="278" y="197" text-anchor="middle" class="name" fill="#fff7ec">AI TOOLING</text><text x="278" y="232" text-anchor="middle" font-size="17" fill="#171722">model boundary / trace proof</text>
    <rect x="490" y="142" width="300" height="106" rx="12" fill="#fff7ec"/><text x="512" y="162" font-size="13" font-weight="900" fill="#62e6ef">C-02</text><rect x="510" y="170" width="260" height="38" rx="5" fill="#11131d" stroke="#62e6ef" stroke-width="2"/><text x="640" y="197" text-anchor="middle" class="name" fill="#62e6ef">AGENT FLOW</text><text x="640" y="232" text-anchor="middle" font-size="17" fill="#171722">orchestration / tool calls</text>
    <rect x="852" y="142" width="300" height="106" rx="12" fill="#fff7ec"/><text x="874" y="162" font-size="13" font-weight="900" fill="#df1837">C-03</text><rect x="872" y="170" width="260" height="38" rx="5" fill="#df1837"/><text x="1002" y="197" text-anchor="middle" class="name" fill="#fff7ec">PRODUCT OPS</text><text x="1002" y="232" text-anchor="middle" font-size="17" fill="#171722">workflow / delivery loop</text>
  </g>
  <g class="mono lift" style="animation-delay:.8s">
    <rect x="128" y="280" width="300" height="96" rx="12" fill="#d8d0c5"/><text x="278" y="334" text-anchor="middle" class="name" fill="#11131d">FULL STACK</text><rect x="152" y="350" width="252" height="8" rx="4" fill="#df1837"/>
    <rect x="490" y="280" width="300" height="96" rx="12" fill="#d8d0c5"/><text x="640" y="334" text-anchor="middle" class="name" fill="#11131d">RUNTIME</text><rect x="514" y="350" width="252" height="8" rx="4" fill="#62e6ef"/>
    <rect x="852" y="280" width="300" height="96" rx="12" fill="#d8d0c5"/><text x="1002" y="334" text-anchor="middle" class="name" fill="#11131d">SYSTEM CRAFT</text><rect x="876" y="350" width="252" height="8" rx="4" fill="#df1837"/>
  </g>
</svg>
