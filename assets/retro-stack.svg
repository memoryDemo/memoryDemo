<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">memoryDemo control deck and stack</title>
  <desc id="desc">A premium retro control deck showing technologies and operating modes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse"><stop stop-color="#fff8ef"/><stop offset="1" stop-color="#eee5da"/></linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#151622"/><stop offset=".6" stop-color="#080b14"/><stop offset="1" stop-color="#120d17"/></linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="130%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity=".22"/></filter>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Mono","Liberation Mono","Consolas",monospace}.label{font-size:18px;font-weight:800;letter-spacing:4px}.pill{font-size:22px;font-weight:900;letter-spacing:1px}@keyframes fill{0%,100%{width:280px}50%{width:760px}}.fill{animation:fill 7s ease-in-out infinite}</style>
  </defs>
  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect x="88" y="46" width="1104" height="328" rx="26" fill="url(#ink)" filter="url(#shadow)"/>
  <text x="128" y="110" class="mono label" fill="#fff7ec">CONTROL DECK</text>
  <g class="mono pill">
    <rect x="128" y="150" width="132" height="46" rx="7" fill="#df1837"/><text x="194" y="181" text-anchor="middle" fill="#fff7ec">PYTHON</text>
    <rect x="282" y="150" width="174" height="46" rx="7" fill="#18d4ea"/><text x="369" y="181" text-anchor="middle" fill="#11131d">TYPESCRIPT</text>
    <rect x="478" y="150" width="132" height="46" rx="7" fill="#fff7ec"/><text x="544" y="181" text-anchor="middle" fill="#11131d">FASTAPI</text>
    <rect x="632" y="150" width="132" height="46" rx="7" fill="none" stroke="#df1837" stroke-width="2"/><text x="698" y="181" text-anchor="middle" fill="#ff5867">NEXT.JS</text>
    <rect x="786" y="150" width="154" height="46" rx="7" fill="none" stroke="#62e6ef" stroke-width="2"/><text x="863" y="181" text-anchor="middle" fill="#62e6ef">LLM APPS</text>
    <rect x="962" y="150" width="158" height="46" rx="7" fill="#df1837"/><text x="1041" y="181" text-anchor="middle" fill="#fff7ec">WORKFLOW</text>
  </g>
  <rect x="128" y="250" width="990" height="18" rx="9" fill="#080a12" stroke="#df1837" stroke-opacity=".5"/>
  <rect x="128" y="250" width="520" height="18" rx="9" fill="#18d4ea" class="fill"/>
  <text x="128" y="312" class="mono label" fill="#62e6ef">MODE</text>
  <text x="240" y="312" class="mono label" fill="#fff7ec">PLAN  /  BUILD  /  VERIFY  /  SHIP</text>
</svg>
