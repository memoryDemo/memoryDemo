<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">memoryDemo cyberpunk red-white 8-bit console banner</title>
  <desc id="desc">A cyberpunk city rendered inside a red and warm white 8-bit console interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10101b"/>
      <stop offset="0.45" stop-color="#191426"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="screen" x1="210" y1="94" x2="1070" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.5" stop-color="#15172d"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="neonRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4c5f"/>
      <stop offset="1" stop-color="#d61135"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#65f7ff"/>
      <stop offset="1" stop-color="#009dff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.9  0 1 0 0 0.05  0 0 1 0 0.2  0 0 0 0.8 0" result="redGlow"/>
      <feMerge>
        <feMergeNode in="redGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0  0 0.8 0 0 0.85  0 0 1 0 1  0 0 0 0.75 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#fff7f1" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="scanline" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="2" fill="#fff7f1" fill-opacity="0.05"/>
    </pattern>
    <style>
      .mono { font-family: "SFMono-Regular", "Cascadia Mono", "Liberation Mono", "Consolas", monospace; }
      .title { font-size: 74px; font-weight: 900; letter-spacing: 6px; }
      .small { font-size: 22px; font-weight: 700; letter-spacing: 3px; }
      .tiny { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="1280" height="520" fill="url(#bg)"/>
  <rect width="1280" height="520" fill="url(#grid)"/>

  <g opacity="0.7">
    <rect x="40" y="56" width="44" height="44" fill="#ff3048"/>
    <rect x="96" y="56" width="18" height="18" fill="#fff7f1"/>
    <rect x="1180" y="422" width="38" height="38" fill="#00d7ff"/>
    <rect x="1230" y="422" width="14" height="14" fill="#fff7f1"/>
    <rect x="1124" y="70" width="28" height="28" fill="#f23b4f"/>
    <rect x="1164" y="70" width="28" height="28" fill="#fff7f1"/>
  </g>

  <rect x="116" y="44" width="1048" height="432" rx="34" fill="#fff7f1"/>
  <rect x="138" y="66" width="1004" height="388" rx="22" fill="#d9d2c6"/>
  <rect x="166" y="92" width="948" height="336" rx="14" fill="#f23b4f"/>
  <rect x="210" y="94" width="860" height="304" rx="10" fill="url(#screen)" stroke="#fff7f1" stroke-width="8"/>
  <rect x="210" y="94" width="860" height="304" rx="10" fill="url(#scanline)"/>

  <g opacity="0.6">
    <path d="M224 367H1056" stroke="#00d7ff" stroke-width="2"/>
    <path d="M266 318L320 272L375 318L430 248L492 318L548 282L608 318L664 238L731 318L784 280L846 318L910 250L1016 318" stroke="#ff4c5f" stroke-width="3" filter="url(#glow)"/>
    <path d="M250 354L344 314L438 354L548 292L654 354L752 306L842 354L962 292L1038 354" stroke="#00d7ff" stroke-width="2" filter="url(#blueGlow)"/>
  </g>

  <g>
    <rect x="256" y="254" width="38" height="114" fill="#17111f"/>
    <rect x="305" y="224" width="42" height="144" fill="#23192d"/>
    <rect x="358" y="190" width="54" height="178" fill="#17111f"/>
    <rect x="426" y="238" width="48" height="130" fill="#21162b"/>
    <rect x="492" y="170" width="72" height="198" fill="#17111f"/>
    <rect x="584" y="212" width="52" height="156" fill="#21162b"/>
    <rect x="654" y="146" width="78" height="222" fill="#17111f"/>
    <rect x="752" y="230" width="56" height="138" fill="#21162b"/>
    <rect x="830" y="178" width="70" height="190" fill="#17111f"/>
    <rect x="920" y="246" width="48" height="122" fill="#21162b"/>
    <rect x="986" y="202" width="42" height="166" fill="#17111f"/>
  </g>

  <g fill="#fff7f1" opacity="0.85">
    <rect x="270" y="274" width="10" height="10"/>
    <rect x="270" y="300" width="10" height="10"/>
    <rect x="322" y="246" width="10" height="10"/>
    <rect x="376" y="218" width="10" height="10"/>
    <rect x="376" y="244" width="10" height="10"/>
    <rect x="514" y="198" width="10" height="10"/>
    <rect x="514" y="224" width="10" height="10"/>
    <rect x="676" y="178" width="10" height="10"/>
    <rect x="676" y="204" width="10" height="10"/>
    <rect x="856" y="202" width="10" height="10"/>
    <rect x="942" y="272" width="10" height="10"/>
    <rect x="1002" y="230" width="10" height="10"/>
  </g>

  <g class="mono">
    <text x="640" y="168" text-anchor="middle" class="tiny" fill="#00d7ff" filter="url(#blueGlow)">CYBER RED-WHITE DEV CONSOLE</text>
    <text x="640" y="238" text-anchor="middle" class="title" fill="#fff7f1" stroke="#f23b4f" stroke-width="2" paint-order="stroke" filter="url(#glow)">MEMORYDEMO</text>
    <text x="640" y="288" text-anchor="middle" class="small" fill="#ff4c5f">INSERT COIN TO BUILD</text>
    <text x="640" y="336" text-anchor="middle" class="tiny" fill="#fff7f1">AI TOOLING  /  AGENT WORKFLOWS  /  PRODUCT SYSTEMS</text>
  </g>

  <g>
    <rect x="238" y="420" width="112" height="28" rx="6" fill="#14121f"/>
    <rect x="256" y="408" width="28" height="52" rx="2" fill="#262132"/>
    <rect x="244" y="420" width="52" height="28" rx="2" fill="#262132"/>
    <rect x="916" y="420" width="42" height="42" rx="21" fill="#f23b4f" filter="url(#glow)"/>
    <rect x="978" y="420" width="42" height="42" rx="21" fill="#14121f"/>
    <rect x="1040" y="420" width="42" height="42" rx="21" fill="#00d7ff" filter="url(#blueGlow)"/>
    <rect x="452" y="426" width="150" height="14" rx="7" fill="#14121f"/>
    <rect x="628" y="426" width="150" height="14" rx="7" fill="#14121f"/>
  </g>

  <g class="mono">
    <text x="262" y="448" class="tiny" fill="#fff7f1">D-PAD</text>
    <text x="912" y="492" class="tiny" fill="#fff7f1">A</text>
    <text x="977" y="492" class="tiny" fill="#fff7f1">B</text>
    <text x="1037" y="492" class="tiny" fill="#fff7f1">START</text>
    <text x="472" y="462" class="tiny" fill="#14121f">SELECT</text>
    <text x="658" y="462" class="tiny" fill="#14121f">RUN</text>
  </g>
</svg>
