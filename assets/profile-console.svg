<svg width="1280" height="1640" viewBox="0 0 1280 1640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">memoryDemo premium cyber famicom profile</title>
  <desc id="desc">A restrained premium cyberpunk Famicom-style profile with subtle mosaic background, CRT animation, cartridge motion, and refined red-white console layout.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1280" y2="1640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbf6ef"/>
      <stop offset="0.48" stop-color="#eee5da"/>
      <stop offset="1" stop-color="#fff8f0"/>
    </linearGradient>
    <linearGradient id="stage" x1="76" y1="72" x2="1204" y2="1568" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14131d"/>
      <stop offset="0.52" stop-color="#090b13"/>
      <stop offset="1" stop-color="#151018"/>
    </linearGradient>
    <linearGradient id="consoleRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4a58"/>
      <stop offset="0.5" stop-color="#e91f3d"/>
      <stop offset="1" stop-color="#9f0928"/>
    </linearGradient>
    <linearGradient id="consoleShell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.55" stop-color="#d9d2c7"/>
      <stop offset="1" stop-color="#fffaf4"/>
    </linearGradient>
    <linearGradient id="crt" x1="210" y1="160" x2="1070" y2="498" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#030712"/>
      <stop offset="0.58" stop-color="#111427"/>
      <stop offset="1" stop-color="#02040a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131522"/>
      <stop offset="0.55" stop-color="#0a0d18"/>
      <stop offset="1" stop-color="#100c16"/>
    </linearGradient>
    <pattern id="mosaic" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#fbf6ef"/>
      <rect x="0" y="0" width="24" height="24" fill="#e91f3d" fill-opacity="0.10"/>
      <rect x="24" y="0" width="24" height="24" fill="#c9c1b6" fill-opacity="0.38"/>
      <rect x="72" y="0" width="24" height="24" fill="#11131d" fill-opacity="0.06"/>
      <rect x="48" y="24" width="24" height="24" fill="#e91f3d" fill-opacity="0.08"/>
      <rect x="0" y="48" width="24" height="24" fill="#11131d" fill-opacity="0.045"/>
      <rect x="48" y="48" width="24" height="24" fill="#c9c1b6" fill-opacity="0.24"/>
      <rect x="72" y="72" width="24" height="24" fill="#e91f3d" fill-opacity="0.13"/>
    </pattern>
    <pattern id="screenGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#68f7ff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="2" fill="#fff7ed" fill-opacity="0.055"/>
    </pattern>
    <clipPath id="screenClip">
      <rect x="210" y="160" width="860" height="318" rx="8"/>
    </clipPath>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="tightShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.12 0 0 0.05  0 0 0.16 0 0.12  0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0  0 0.95 0 0 0.9  0 0 1 0 1  0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular", "Cascadia Mono", "Liberation Mono", "Consolas", monospace; }
      .cn { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .label { font-size: 18px; font-weight: 800; letter-spacing: 4px; }
      .small { font-size: 20px; font-weight: 760; letter-spacing: 2px; }
      .term { font-size: 25px; letter-spacing: .8px; }
      .title { font-size: 78px; font-weight: 900; letter-spacing: 5px; }
      @keyframes cart {
        0%, 18% { transform: translateY(-64px); }
        34%, 100% { transform: translateY(0); }
      }
      @keyframes scanMove {
        from { transform: translateY(-28px); }
        to { transform: translateY(28px); }
      }
      @keyframes shimmer {
        0%, 100% { opacity: .42; }
        50% { opacity: .88; }
      }
      @keyframes cursor {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }
      @keyframes line {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -120; }
      }
      @keyframes breathe {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .cart { animation: cart 5.8s cubic-bezier(.2,.85,.25,1) infinite; transform-box: fill-box; transform-origin: center; }
      .scan { animation: scanMove 2.8s linear infinite; }
      .shimmer { animation: shimmer 3.8s ease-in-out infinite; }
      .cursor { animation: cursor 1.1s steps(1, end) infinite; }
      .flow { stroke-dasharray: 16 14; animation: line 7.5s linear infinite; }
      .breathe { animation: breathe 5.6s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1280" height="1640" fill="url(#paper)"/>
  <rect width="1280" height="1640" fill="url(#mosaic)" opacity="0.92"/>
  <rect x="76" y="72" width="1128" height="1496" rx="34" fill="url(#stage)" filter="url(#shadow)"/>
  <rect x="98" y="94" width="1084" height="1452" rx="26" fill="none" stroke="#fff7ed" stroke-opacity="0.18"/>
  <rect x="112" y="108" width="1056" height="1424" rx="20" fill="none" stroke="#e91f3d" stroke-opacity="0.22"/>

  <g opacity="0.72">
    <rect x="0" y="0" width="1280" height="1640" fill="url(#mosaic)" opacity="0.08"/>
    <path d="M124 1260C276 1156 398 1236 536 1122C710 978 882 1084 1128 900" stroke="#68f7ff" stroke-opacity="0.20" stroke-width="2" class="flow"/>
    <path d="M134 360C312 248 446 402 596 304C770 190 892 280 1140 172" stroke="#e91f3d" stroke-opacity="0.25" stroke-width="2" class="flow"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="108" y="88" width="1064" height="546" rx="42" fill="url(#consoleShell)"/>
    <rect x="136" y="118" width="1008" height="486" rx="26" fill="#cbc6ba"/>
    <rect x="162" y="150" width="956" height="382" rx="14" fill="url(#consoleRed)"/>
    <rect x="196" y="146" width="888" height="346" rx="12" fill="#fff7ed"/>
    <rect x="210" y="160" width="860" height="318" rx="8" fill="url(#crt)"/>
    <rect x="210" y="160" width="860" height="318" rx="8" fill="url(#screenGrid)"/>
    <g class="scan">
      <rect x="210" y="128" width="860" height="384" fill="url(#scan)"/>
    </g>
  </g>

  <g class="cart" filter="url(#tightShadow)">
    <rect x="528" y="42" width="224" height="112" rx="16" fill="#fff7ed" stroke="#e91f3d" stroke-width="7"/>
    <rect x="554" y="66" width="172" height="44" rx="5" fill="#12131d"/>
    <text x="640" y="96" text-anchor="middle" class="mono label" fill="#68f7ff">8-BIT CART</text>
    <rect x="584" y="128" width="112" height="20" fill="#1d1b27"/>
  </g>

  <g clip-path="url(#screenClip)">
    <g opacity="0.9">
      <rect x="246" y="328" width="58" height="98" fill="#171320"/>
      <rect x="322" y="286" width="68" height="140" fill="#21182b"/>
      <rect x="410" y="238" width="72" height="188" fill="#15121e"/>
      <rect x="504" y="286" width="68" height="140" fill="#21182b"/>
      <rect x="592" y="222" width="98" height="204" fill="#14111d"/>
      <rect x="714" y="272" width="70" height="154" fill="#21182b"/>
      <rect x="804" y="236" width="82" height="190" fill="#15121e"/>
      <rect x="906" y="298" width="62" height="128" fill="#21182b"/>
      <rect x="990" y="262" width="70" height="164" fill="#15121e"/>
    </g>
    <path d="M230 392L340 318L452 392L570 288L696 392L820 306L942 392L1048 294" stroke="#68f7ff" stroke-width="3" stroke-opacity="0.88" filter="url(#cyanGlow)" class="flow"/>
    <path d="M232 362L342 296L454 362L572 260L698 362L822 282L944 362L1048 270" stroke="#ff3e55" stroke-width="3" stroke-opacity="0.95" filter="url(#redGlow)" class="flow"/>
    <g fill="#fff7ed" opacity="0.82">
      <rect x="268" y="344" width="10" height="10"/>
      <rect x="348" y="312" width="10" height="10"/>
      <rect x="430" y="258" width="10" height="10"/>
      <rect x="610" y="244" width="10" height="10"/>
      <rect x="836" y="258" width="10" height="10"/>
      <rect x="1012" y="282" width="10" height="10"/>
    </g>
  </g>

  <g class="mono">
    <text x="640" y="224" text-anchor="middle" class="label" fill="#68f7ff" filter="url(#cyanGlow)">CYBER FAMICOM SYSTEM</text>
    <text x="640" y="318" text-anchor="middle" class="title" fill="#fff7ed" stroke="#e91f3d" stroke-width="2" paint-order="stroke" filter="url(#redGlow)">MEMORYDEMO</text>
    <text x="640" y="372" text-anchor="middle" class="label shimmer" fill="#ff5867">PRESS START</text>
    <text x="640" y="424" text-anchor="middle" class="small" fill="#fff7ed">AI TOOLING / AGENT WORKFLOWS / PRODUCT SYSTEMS</text>
  </g>

  <g>
    <rect x="226" y="536" width="112" height="32" rx="6" fill="#13131d"/>
    <rect x="250" y="510" width="30" height="80" rx="3" fill="#272331"/>
    <rect x="224" y="536" width="84" height="30" rx="3" fill="#272331"/>
    <rect x="458" y="548" width="182" height="18" rx="9" fill="#10111a"/>
    <rect x="668" y="548" width="182" height="18" rx="9" fill="#10111a"/>
    <circle cx="946" cy="558" r="32" fill="#e91f3d" filter="url(#redGlow)"/>
    <circle cx="1028" cy="558" r="32" fill="#11111b"/>
    <circle cx="1110" cy="558" r="32" fill="#18d4ea" filter="url(#cyanGlow)"/>
    <text x="282" y="606" text-anchor="middle" class="mono label" fill="#fff7ed">D-PAD</text>
    <text x="548" y="606" text-anchor="middle" class="mono label" fill="#15131d">SELECT</text>
    <text x="760" y="606" text-anchor="middle" class="mono label" fill="#15131d">RUN</text>
  </g>

  <g class="breathe">
    <rect x="132" y="700" width="1016" height="162" rx="18" fill="#fff7ed" fill-opacity="0.08" stroke="#fff7ed" stroke-opacity="0.16"/>
    <rect x="148" y="716" width="984" height="130" rx="12" fill="#0d101c" stroke="#e91f3d" stroke-opacity="0.65"/>
    <text x="640" y="768" text-anchor="middle" class="cn" font-size="44" font-weight="800" fill="#fff7ed">逻迦子</text>
    <text x="640" y="812" text-anchor="middle" class="mono label" fill="#ff5867">memoryDemo</text>
    <path d="M212 826H1068" stroke="#68f7ff" stroke-opacity="0.36" stroke-width="2" class="flow"/>
    <text x="640" y="840" text-anchor="middle" class="cn" font-size="20" font-weight="700" fill="#68f7ff">硅砚耕云，码间生墨</text>
  </g>

  <g>
    <rect x="132" y="914" width="484" height="304" rx="18" fill="url(#panel)" stroke="#68f7ff" stroke-opacity="0.62" stroke-width="2"/>
    <rect x="664" y="914" width="484" height="304" rx="18" fill="url(#panel)" stroke="#e91f3d" stroke-opacity="0.62" stroke-width="2"/>
    <text x="172" y="980" class="mono label" fill="#68f7ff">BOOT SCREEN</text>
    <text x="704" y="980" class="mono label" fill="#ff5867">CARTRIDGE SLOTS</text>
    <g class="mono term" fill="#fff7ed">
      <text x="172" y="1048">READY.</text>
      <text x="172" y="1090">LOAD "PROFILE",8,1</text>
      <text x="172" y="1132">RUN</text>
      <text x="172" y="1174">&gt; USER: memoryDemo</text>
      <rect x="490" y="1153" width="14" height="28" fill="#68f7ff" class="cursor"/>
    </g>
    <g class="mono" font-size="21" font-weight="800">
      <rect x="704" y="1032" width="176" height="44" rx="6" fill="#e91f3d"/>
      <text x="792" y="1062" text-anchor="middle" fill="#fff7ed">AI TOOLING</text>
      <rect x="902" y="1032" width="190" height="44" rx="6" fill="none" stroke="#68f7ff" stroke-width="2"/>
      <text x="997" y="1062" text-anchor="middle" fill="#68f7ff">AGENT FLOW</text>
      <rect x="704" y="1104" width="210" height="44" rx="6" fill="none" stroke="#e91f3d" stroke-width="2"/>
      <text x="809" y="1134" text-anchor="middle" fill="#ff5867">PRODUCT OPS</text>
      <rect x="936" y="1104" width="156" height="44" rx="6" fill="#18d4ea"/>
      <text x="1014" y="1134" text-anchor="middle" fill="#10121b">FULL STACK</text>
    </g>
  </g>

  <g>
    <rect x="132" y="1272" width="1016" height="222" rx="18" fill="url(#panel)" stroke="#fff7ed" stroke-opacity="0.18"/>
    <text x="172" y="1338" class="mono label" fill="#fff7ed">CONTROL DECK</text>
    <g class="mono" font-size="22" font-weight="850">
      <rect x="172" y="1378" width="128" height="42" rx="6" fill="#e91f3d"/>
      <text x="236" y="1407" text-anchor="middle" fill="#fff7ed">PYTHON</text>
      <rect x="316" y="1378" width="166" height="42" rx="6" fill="#18d4ea"/>
      <text x="399" y="1407" text-anchor="middle" fill="#10121b">TYPESCRIPT</text>
      <rect x="498" y="1378" width="126" height="42" rx="6" fill="#fff7ed"/>
      <text x="561" y="1407" text-anchor="middle" fill="#10121b">FASTAPI</text>
      <rect x="640" y="1378" width="126" height="42" rx="6" fill="none" stroke="#e91f3d" stroke-width="2"/>
      <text x="703" y="1407" text-anchor="middle" fill="#ff5867">NEXT.JS</text>
      <rect x="782" y="1378" width="150" height="42" rx="6" fill="none" stroke="#68f7ff" stroke-width="2"/>
      <text x="857" y="1407" text-anchor="middle" fill="#68f7ff">LLM APPS</text>
      <rect x="948" y="1378" width="150" height="42" rx="6" fill="#e91f3d"/>
      <text x="1023" y="1407" text-anchor="middle" fill="#fff7ed">WORKFLOW</text>
    </g>
    <rect x="172" y="1454" width="924" height="18" rx="9" fill="#0a0c14" stroke="#e91f3d" stroke-opacity="0.42"/>
    <rect x="172" y="1454" width="520" height="18" rx="9" fill="#18d4ea" opacity="0.88">
      <animate attributeName="width" values="240;520;760;520;240" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g>
    <rect x="132" y="1526" width="1016" height="56" rx="12" fill="#fff7ed"/>
    <rect x="148" y="1540" width="984" height="28" rx="6" fill="#10121b"/>
    <text x="640" y="1561" text-anchor="middle" class="mono label" fill="#68f7ff">INSERT COIN  |  PRESS START  |  BUILD THE NEXT SYSTEM</text>
  </g>
</svg>
